# ============================================================================
# mojalab-vps-stack — Browser-first homelab on a single Hetzner VPS
# ============================================================================
# A complete Docker Compose stack for a self-hosted, browser-accessible homelab
# with SSO+2FA on every service.
#
# Companion repository for the article:
# https://mojalab.com/browser-first-homelab/
#
# Stack:
#   - Caddy            reverse proxy + automatic HTTPS
#   - Authelia         SSO + TOTP 2FA gate
#   - Filestash        web file manager
#   - Zellij           persistent web terminal
#   - Glances          system metrics dashboard
#   - Watchtower       monitor-only update notifier (Telegram)
#   - dockerproxy      least-privilege Docker socket proxy
#
# Read README.md before deploying. Run scripts/install.sh for guided setup.
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # Caddy — the front door. Handles TLS, routing, and forward_auth checks.
  # --------------------------------------------------------------------------
  caddy:
    image: caddy:2.8-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/home:/srv/home:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    networks:
      - lab
    depends_on:
      authelia:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Authelia — the lock. Single sign-on with TOTP second factor.
  # --------------------------------------------------------------------------
  authelia:
    image: authelia/authelia:4
    container_name: authelia
    restart: unless-stopped
    # tty:true makes the Docker logs API emit a plain (non-multiplexed) stream
    # so tgbot can tail it line-by-line via dockerproxy. Authelia's stdout is
    # text-only logfmt, so this has no other side effect.
    tty: true
    volumes:
      - ./authelia:/config
    environment:
      - TZ=${TZ:-Europe/Rome}
      - AUTHELIA_JWT_SECRET_FILE=/config/secrets/jwt_secret
      - AUTHELIA_SESSION_SECRET_FILE=/config/secrets/session_secret
      - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=/config/secrets/storage_encryption_key
      - AUTHELIA_NOTIFIER_SMTP_PASSWORD_FILE=/config/secrets/smtp_password
    networks:
      - lab
    expose:
      - 9091
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Filestash — the workbench surface. Web file manager with in-browser editing.
  # --------------------------------------------------------------------------
  filestash:
    image: machines/filestash:latest
    container_name: filestash
    restart: unless-stopped
    environment:
      - APPLICATION_URL=files.${DOMAIN}
      - TZ=${TZ:-Europe/Rome}
    volumes:
      - filestash_data:/app/data/state
      - /srv:/mnt/data:rw       # The host filesystem area to expose
    networks:
      - lab
    expose:
      - 8334
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8334/about || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Zellij — the workbench itself. Persistent terminal sessions in the browser.
  # NOTE: Zellij's web client runs as a non-root user; the entrypoint serves it
  # on 0.0.0.0:8082. The login token must be created interactively (see README).
  # --------------------------------------------------------------------------
  zellij:
    build:
      context: ./zellij
      dockerfile: Dockerfile
    container_name: zellij
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Rome}
    volumes:
      # --- System state (named volumes, hidden from host browsing) -------
      - zellij_config:/home/lab/.config/zellij
      - zellij_cache:/home/lab/.cache/zellij    # web tokens (older zellij)
      - zellij_data:/home/lab/.local/share/zellij  # web tokens (zellij 0.44+)
      - wetty_keys:/ssh-keys                    # shared with wetty (RW here)

      # --- Dev user state (bind mounts on host, easy backup, OUT of /srv
      #     so Filestash CANNOT see your secrets/credentials) -------------
      - ${LAB_STATE_DIR:-/var/lib/mojalab/lab}/local:/home/lab/.local       # pip --user, npm globals, ~/.local/bin, secrets.env
      - ${LAB_STATE_DIR:-/var/lib/mojalab/lab}/config:/home/lab/.config     # opencode, gh, git, XDG configs
      - ${LAB_STATE_DIR:-/var/lib/mojalab/lab}/claude:/home/lab/.claude     # Claude Code auth + state
      - ${LAB_STATE_DIR:-/var/lib/mojalab/lab}/npm:/home/lab/.npm           # npm cache

      # --- Workspace under /srv so Filestash (files.${DOMAIN}) can browse,
      #     upload, download project files from the web --------------------
      - /srv/workspace:/home/lab/workspace
      - /srv:/srv:rw            # Same /srv mount as Filestash, so terminal and
                                 # file manager see the same tree
    networks:
      - lab
    expose:
      - 8082
      - 22         # sshd — used internally by wetty for the mobile web terminal
    healthcheck:
      test: ["CMD-SHELL", "ss -ltn 'sport = :8082' | grep -q LISTEN || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # wetty — mobile-friendly web terminal. Connects via SSH to the zellij
  # sidecar over the internal 'lab' network and auto-attaches to session 'main'
  # (handled by the lab user's .bashrc). Replaces ttyd, which ate keystrokes
  # on phones because of textarea autocorrect.
  # --------------------------------------------------------------------------
  wetty:
    build:
      context: ./wetty
      dockerfile: Dockerfile
    container_name: wetty
    restart: unless-stopped
    environment:
      - TERM=xterm-256color
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    command:
      - "--ssh-host=zellij"
      - "--ssh-port=22"
      - "--ssh-user=lab"
      - "--ssh-auth=publickey"
      - "--ssh-key=/ssh-keys/wetty_id_ed25519"
      - "--base=/"
      - "--port=3000"
    volumes:
      - wetty_keys:/ssh-keys:ro
    networks:
      - lab
    expose:
      - 3000
    depends_on:
      - zellij
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # dockerproxy — minimal Docker API exposed read-only to Watchtower & Glances.
  # Replaces direct mount of /var/run/docker.sock into those services.
  # --------------------------------------------------------------------------
  dockerproxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    restart: unless-stopped
    environment:
      # Read-only access to the bits Watchtower & Glances actually need.
      # Watchtower:  CONTAINERS, IMAGES, VERSION (and PING for liveness)
      # Glances:     CONTAINERS, INFO, VERSION  (and PING for liveness)
      - CONTAINERS=1
      - IMAGES=1
      - INFO=1
      - VERSION=1
      - PING=1
      - LOGS=1       # tgbot tails authelia logs to alert on web logins
      - POST=0       # Deny any write/exec/start/stop call
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lab
    expose:
      - 2375
    read_only: true
    tmpfs:
      - /run
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Glances — the dashboard pane. System metrics, container stats, network I/O.
  # --------------------------------------------------------------------------
  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped
    pid: host
    environment:
      - TZ=${TZ:-Europe/Rome}
      - GLANCES_OPT=-w
      - DOCKER_HOST=tcp://dockerproxy:2375
      - DOCKER_API_VERSION=1.45
    networks:
      - lab
    expose:
      - 61208
    depends_on:
      - dockerproxy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:61208/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Watchtower — the night watch. Monitor-only, daily Telegram digest.
  # IMPORTANT: This config does NOT auto-update containers. By design.
  # See the article for why: https://mojalab.com/browser-first-homelab/
  # --------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Rome}
      - DOCKER_HOST=tcp://dockerproxy:2375
      - DOCKER_API_VERSION=1.45
      - WATCHTOWER_MONITOR_ONLY=true
      - WATCHTOWER_SCHEDULE=0 0 5 * * *           # 5 AM UTC daily
      - WATCHTOWER_NOTIFICATION_REPORT=true
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=telegram://${TELEGRAM_BOT_TOKEN}@telegram?chats=${TELEGRAM_CHAT_ID}
      - WATCHTOWER_NOTIFICATION_TEMPLATE_FILE=/notification.tpl
    volumes:
      - ./watchtower/notification.tpl:/notification.tpl:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=false"   # Don't monitor self
    networks:
      - lab
    depends_on:
      - dockerproxy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # tgbot — Telegram bot that answers /stats, /df, /uptime by querying Glances.
  # Single-user: only TELEGRAM_CHAT_ID is allowed to issue commands.
  # --------------------------------------------------------------------------
  tgbot:
    build:
      context: ./tgbot
      dockerfile: Dockerfile
    container_name: tgbot
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Rome}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GLANCES_URL=http://glances:61208
      # Proactive alerts (set any to 0 to disable)
      - ALERT_DISK_PCT=${ALERT_DISK_PCT:-85}
      - ALERT_MEM_PCT=${ALERT_MEM_PCT:-90}
      - ALERT_LOAD=${ALERT_LOAD:-0}
      - HEARTBEAT_HOURS=${HEARTBEAT_HOURS:-3}
      - ALERT_SSH=${ALERT_SSH:-1}
      - ALERT_AUTHELIA=${ALERT_AUTHELIA:-1}
      - DOCKER_HOST=tcp://dockerproxy:2375
      - ALERT_COOLDOWN=${ALERT_COOLDOWN:-3600}
    volumes:
      # Read-only host logs so the watcher can detect SSH logins.
      # Best-effort: only Debian/Ubuntu have /var/log/auth.log.
      - /var/log:/var/log:ro
    tmpfs:
      - /tmp/tgbot:size=4M,uid=1000,gid=1000
    networks:
      - lab
    depends_on:
      - glances
      - dockerproxy
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================================
# Networks & volumes
# ============================================================================
networks:
  lab:
    name: lab
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  filestash_data:
  zellij_config:
  zellij_cache:
  zellij_data:
  wetty_keys:
